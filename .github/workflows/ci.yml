name: CI — Lint & Build

# Chạy khi push hoặc mở Pull Request vào nhánh main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: Frontend (Vite + React + TypeScript)
  # ============================================================
  frontend:
    name: 🖥️ Frontend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: real-estate-frontend

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: real-estate-frontend/package-lock.json

      - name: Cài đặt dependencies
        run: |
          rm -f package-lock.json
          npm install

      # Tạo file .env cho Vite để build không lỗi thiếu biến
      - name: Tạo .env từ GitHub Secrets
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env

      - name: Lint
        run: npm run lint

      - name: Build (kiểm tra compile thành công)
        run: npm run build

  # ============================================================
  # Job 2: Backend (NestJS + Prisma)
  # ============================================================
  backend:
    name: ⚙️ Backend — Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: real-estate-api

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: real-estate-api/package-lock.json

      - name: Cài đặt dependencies
        run: npm ci

      # Prisma generate cần DATABASE_URL dù chỉ ở dạng placeholder
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:placeholder@localhost:3306/real_estate"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
