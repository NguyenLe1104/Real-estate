services:
  n8n:
    image: n8nio/n8n:latest
    container_name: real-estate-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace_with_a_long_random_string}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
      REAL_ESTATE_API_BASE_URL: ${REAL_ESTATE_API_BASE_URL:-https://blackscity.app/api}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-qwen2.5:7b}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ollama
      - qdrant
    networks:
      - ai-network

  ollama:
    image: ollama/ollama:latest
    container_name: real-estate-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: real-estate-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-network

volumes:
  n8n_data:
  ollama_data:
  qdrant_data:

networks:
  ai-network:
    name: real-estate-ai-network
  real-estate-shared:
    external: true
    name: ${REAL_ESTATE_SHARED_NETWORK:-real-estate_default}
